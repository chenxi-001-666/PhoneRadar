{% extends "main/base.html" %}
{% block content %}
<div class="card shadow p-4">
    <h2>Deliver phone review</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="mt-4">
            <button type="submit" class="btn btn-primary px-4">Submit</button>
            <a href="{% url 'index' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
